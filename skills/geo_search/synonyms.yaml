# Methylation technology terms — used when no platform is specified.
# Keep this list SHORT: NCBI GDS full-text search is fast on specific terms.
# Avoid generic terms like "CpG methylation" that match thousands of non-array studies.
methylation_tech_terms:
- DNA methylation
- 450K
- EPIC
- RRBS
- WGBS
- bisulfite sequencing
- methylation array
- methylome

# Liquid biopsy terms — used when sample_type is cfDNA/plasma/serum.
# CRITICAL: keep only high-specificity terms.
# Removed: blood, non-invasive, screening, diagnosis, early detection, blood-based
# (these are far too broad and cause NCBI to return thousands of unrelated results,
#  triggering abuse detection on long queries)
liquid_biopsy_terms:
- cfDNA
- cell-free DNA
- ctDNA
- circulating tumor DNA
- plasma
- serum
- liquid biopsy
- circulating DNA
