llm:
  # backend options: openai | zhipu | anthropic | ollama | deepseek
  #
  # For ZhipuAI (智谱), set backend: zhipu and configure .env:
  #   ZHIPU_API_KEY=your_key
  #   ZHIPU_MODEL=glm-4-flash        # or glm-4-air, glm-4, glm-4-long
  #
  # For DeepSeek, set backend: deepseek and configure .env:
  #   DEEPSEEK_API_KEY=sk-...
  #   DEEPSEEK_MODEL=deepseek-chat   # or deepseek-reasoner
  #
  # Alternatively, keep backend: openai and set in .env:
  #   OPENAI_API_KEY=your_zhipu_key
  #   OPENAI_BASE_URL=https://open.bigmodel.cn/api/paas/v4
  #   OPENAI_MODEL=glm-4-flash
  # (the factory auto-detects bigmodel.cn and applies correct auth)
  backend: zhipu
  model: glm-4-flash
  api_key_env: ZHIPU_API_KEY
  temperature: 0
  max_tokens: 4096

download:
  output_dir: ./data/methylation
  max_concurrent: 5
  retry_attempts: 3
  retry_delay: 2           # seconds, exponential backoff base
  chunk_size_mb: 10
  timeout: 300             # seconds per request

registry:
  db_path: ./registry/methyagent.db

geo:
  api_key_env: NCBI_API_KEY   # optional, raises rate limit from 3 to 10 req/s
  base_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
  ftp_base: ftp://ftp.ncbi.nlm.nih.gov/geo/series
  proxy: ""                   # optional, e.g. "socks5h://127.0.0.1:1080" or "http://proxy:port"
                              # env var NCBI_PROXY overrides this setting
  # GEO filtering mode:
  #   false (default) → legacy 3-step funnel (screen → GSM judge → PubMed verify),
  #                     with hardcoded thresholds.
  #   true             → spec-driven geo_filter skill: one threshold-free LLM
  #                     verdict per dataset, following skills/geo_filter/SPEC.md.
  #                     Edit filtering behaviour by editing that SPEC.md.
  skill_filter: true

tcga:
  gdc_api_base: https://api.gdc.cancer.gov
  gdc_token_env: GDC_TOKEN   # optional, only needed for controlled-access data

literature:
  max_papers_per_query: 50
  sources:
    - pubmed
    - pmc
    - biorxiv
  extract_supplementary: true
  biorxiv_api_base: https://api.biorxiv.org
  pmc_fulltext_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils

  # ── LLM-assisted PDF accession extraction ──────────────────────────────
  llm_extraction:
    enabled: true

    # When to trigger LLM extraction:
    #   regex_fallback  → only when regex finds 0 accessions (recommended, lowest cost)
    #   always          → always run LLM regardless of regex result
    #   keyword_trigger → only when trigger keywords are present in section text
    trigger: regex_fallback

    # Minimum confidence level to write to registry:
    #   high   → only auto-verified accessions
    #   medium → also include pending_review accessions (recommended)
    #   low    → include all (not recommended, high noise)
    min_confidence: medium

    # Confidence threshold for automatic download (without human review):
    #   high   → only explicitly stated accessions trigger auto-download
    auto_download_confidence: high

    # Run GEO API verification to filter LLM hallucinations (recommended)
    verify_with_geo_api: true

    # Cache LLM results by DOI to avoid redundant API calls
    cache_results: true
    cache_db_path: /app/data/methyagent_llm_cache.db

    # Maximum characters of section text to send to LLM per call
    max_section_chars: 3000

    # Target sections to extract from PDF (ordered by priority)
    target_sections:
      # English
      - data availability statement
      - data availability
      - data access
      - availability of data and materials
      - accession numbers
      - accession codes
      - data deposition
      - key resources table        # Cell series
      - reporting summary          # Nature series
      - materials and methods
      - methods
      # Chinese
      - 数据可用性声明
      - 数据可用性
      - 数据获取
      - 登录号
      - 材料与方法

logging:
  level: INFO
  log_file: /app/data/logs/methyagent.log
